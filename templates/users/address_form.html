{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <div class="flex items-center gap-4 mb-8">
                    <a href="{% url 'address_list' %}" class="p-2 rounded-lg hover:bg-gray-50 text-gray-500">
                        <i data-lucide="arrow-left" class="h-5 w-5"></i>
                    </a>
                    <h2 class="text-2xl font-bold text-gray-900">{% if form.instance.pk %}Edit Address{% else %}Add New
                        Address{% endif %}</h2>
                </div>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Street Address</label>
                            <input type="text" name="street" value="{{ form.street.value|default:'' }}" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-600 focus:border-green-600 sm:text-sm transition-standard">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">City / Area</label>
                            <input type="text" name="city" value="{{ form.city.value|default:'' }}" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-600 focus:border-green-600 sm:text-sm transition-standard">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Phone</label>
                            <input type="tel" name="phone" value="{{ form.phone.value|default:'' }}" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-600 focus:border-green-600 sm:text-sm transition-standard">
                        </div>

                        <div class="flex items-center gap-2 pt-2">
                            <input type="checkbox" name="is_default" id="is_default" {% if form.is_default.value
                                %}checked{% endif %}
                                class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
                            <label for="is_default" class="text-sm text-gray-700">Set as default delivery
                                address</label>
                        </div>
                    </div>

                    <div class="pt-4 flex gap-4">
                        <button type="submit" class="flex-1 btn-primary py-2 rounded-lg font-bold shadow-md">
                            Save Address
                        </button>
                        <a href="{% url 'address_list' %}"
                            class="flex-1 bg-white border border-gray-300 text-gray-700 py-2 rounded-lg font-bold text-center hover:bg-gray-50 transition-standard">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
