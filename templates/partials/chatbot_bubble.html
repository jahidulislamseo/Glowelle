<div id="chatbot-container" class="fixed bottom-20 md:bottom-8 right-4 md:right-6 z-[9999] flex flex-col items-end">
    <!-- Chat Window -->
    <div id="chatbot-window"
        class="hidden w-80 sm:w-96 bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-white/20 overflow-hidden flex-col transition-all duration-300 transform scale-95 opacity-0 origin-bottom-right mb-4">
        <!-- Header -->
        <div
            class="bg-gradient-to-r from-pink-600 to-pink-500 p-4 flex items-center justify-between text-white shadow-md">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center border border-white/30">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-sm">AI Assistant</h3>
                    <div class="flex items-center space-x-1">
                        <span class="w-2 h-2 bg-pink-300 rounded-full animate-pulse"></span>
                        <span class="text-[10px] opacity-80 uppercase tracking-tighter">Online</span>
                    </div>
                </div>
            </div>
            <button id="close-chatbot"
                class="hover:bg-white/10 w-8 h-8 rounded-full transition-colors flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="chatbot-messages" class="h-80 sm:h-96 overflow-y-auto p-4 space-y-4 scroll-smooth bg-gray-50/30">
            <!-- Bot Welcome Message -->
            <div class="flex justify-start">
                <div
                    class="max-w-[80%] bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-gray-800">
                    Hello! Welcome to Nyveralife. How can I help you today?
                </div>
            </div>
        </div>
        <!-- Suggestions Area (Fixed at bottom) -->
        <div id="chatbot-suggestions" class="px-4 py-2 flex flex-wrap gap-2 bg-gray-50/30"></div>

        <!-- Input Area -->
        <form id="chatbot-form" class="p-3 bg-white border-t border-gray-100 flex items-center space-x-2">
            <input type="text" id="chatbot-input"
                class="flex-1 bg-gray-50 border-none focus:ring-2 focus:ring-pink-500 rounded-xl px-4 py-2 text-sm"
                placeholder="Type your message..." autocomplete="off">
            <button type="submit"
                class="no-loading bg-pink-600 hover:bg-pink-700 text-white w-10 h-10 rounded-xl transition-all shadow-md flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
                title="Send message">
                <i class="fas fa-paper-plane text-base"></i>
            </button>
        </form>
    </div>

    <!-- Toggle Button -->
    <button id="chatbot-toggle"
        class="bg-pink-600 hover:bg-pink-700 text-white w-14 h-14 rounded-full shadow-2xl transition-all hover:scale-110 flex items-center justify-center border-4 border-white"
        title="Chat with us">
        <i class="fas fa-comments text-2xl" id="toggle-icon"></i>
    </button>
</div>
