{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[calc(100vh-180px)] items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">
                Verify OTP
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                We've sent a 6-digit code to <span class="font-bold text-gray-900">{{ phone }}</span>
            </p>
        </div>

        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="otp_code" class="block text-sm font-medium text-gray-700 mb-1">Enter 6-digit
                        Code</label>
                    <input id="otp_code" name="otp_code" type="text" pattern="\d{6}" maxlength="6" required autofocus
                        class="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-600 focus:border-pink-600 text-center text-2xl font-bold tracking-[0.5em] transition-standard"
                        placeholder="······">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="{% url 'request_otp' %}" class="font-medium text-pink-600 hover:text-pink-500">
                        Didn't receive code? Resend
                    </a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="btn-primary group relative flex w-full justify-center rounded-md px-3 py-2 text-sm font-semibold shadow-sm">
                    Verify & Login
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Self-submitting when 6 digits are entered
    document.getElementById('otp_code').addEventListener('input', function (e) {
        if (this.value.length === 6) {
            this.closest('form').submit();
        }
    });
</script>
{% endblock %}
