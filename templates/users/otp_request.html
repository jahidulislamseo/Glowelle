{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[calc(100vh-180px)] items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">
                Login with Mobile
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter your phone number to receive a 6-digit OTP
            </p>
        </div>

        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="phone_number" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                            <i data-lucide="phone" class="h-4 w-4"></i>
                        </div>
                        <input id="phone_number" name="phone_number" type="tel" required
                            class="appearance-none block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-600 focus:border-pink-600 sm:text-sm transition-standard"
                            placeholder="e.g. 01712345678">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="{% url 'login' %}" class="font-medium text-pink-600 hover:text-pink-500">
                        Back to password login
                    </a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="btn-primary group relative flex w-full justify-center rounded-md px-3 py-2 text-sm font-semibold shadow-sm">
                    Send OTP
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
