{% extends 'base.html' %}

{% block title %}Page Not Found - Al Barakah Mart{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="bg-red-50 text-red-600 rounded-full p-6 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>

    <h1 class="text-4xl font-bold text-gray-900 mb-2">404</h1>
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Page Not Found</h2>
    <p class="text-gray-600 max-w-md mb-8">
        Oops! The page you are looking for doesn't exist. It might have been moved or deleted.
    </p>

    <div class="flex gap-4">
        <a href="{% url 'home' %}"
            class="px-6 py-3 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition-colors">
            Go Home
        </a>
        <a href="{% url 'shop' %}"
            class="px-6 py-3 bg-white text-gray-700 border border-gray-300 font-medium rounded-lg hover:bg-gray-50 transition-colors">
            Continue Shopping
        </a>
    </div>
</div>
{% endblock %}
