{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-16 max-w-4xl">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-4 text-pink-800">Contact Us</h1>
        <p class="text-gray-600">We'd love to hear from you</p>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
        <!-- Contact Info -->
        <div class="space-y-8">
            <div class="flex items-start gap-4">
                <div class="bg-pink-100 p-3 rounded-full text-pink-600">
                    <i data-lucide="map-pin" class="h-6 w-6"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-1">Our Location</h3>
                    <p class="text-gray-600">123 Organic Lane, Green City,<br>Dhaka-1200, Bangladesh</p>
                </div>
            </div>

            <div class="flex items-start gap-4">
                <div class="bg-pink-100 p-3 rounded-full text-pink-600">
                    <i data-lucide="phone" class="h-6 w-6"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-1">Phone Number</h3>
                    <p class="text-gray-600">+880 1234 567890<br>+880 9876 543210</p>
                </div>
            </div>

            <div class="flex items-start gap-4">
                <div class="bg-pink-100 p-3 rounded-full text-pink-600">
                    <i data-lucide="mail" class="h-6 w-6"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-1">Email Address</h3>
                    <p class="text-gray-600">info@glowellebd.com<br>support@glowellebd.com</p>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
            <form action="{% url 'contact' %}" method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="id_name" class="block text-sm font-medium mb-1">Your Name</label>
                    <input type="text" id="id_name" name="name" autocomplete="name" required
                        class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label for="id_email" class="block text-sm font-medium mb-1">Email Address</label>
                    <input type="email" id="id_email" name="email" autocomplete="email" required
                        class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label for="id_message" class="block text-sm font-medium mb-1">Message</label>
                    <textarea id="id_message" name="message" rows="4" required
                        class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 focus:outline-none transition-all"></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-pink-600 text-white font-bold py-3 rounded-md hover:bg-pink-700 transition-all active:scale-[0.98]">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
