{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<style>
    #content { padding: 30px 40px !important; }

    .log-container {
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 40px 50px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .log-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f1f5f9;
    }

    .log-header h1 {
        font-size: 26px !important;
        font-weight: 800 !important;
        color: #1e293b !important;
        margin: 0 !important;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        background: #f1f5f9;
        color: #475569;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
    }
    .back-btn:hover { background: #e2e8f0; color: #1e293b; text-decoration: none; }

    /* Markdown rendered styles */
    .log-body h1 { font-size: 26px; font-weight: 800; color: #0f172a; margin: 32px 0 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
    .log-body h2 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 28px 0 10px; }
    .log-body h3 { font-size: 16px; font-weight: 600; color: #334155; margin: 20px 0 8px; }

    .log-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0 20px;
        font-size: 14px;
    }
    .log-body table th {
        background: #f8fafc;
        padding: 10px 14px;
        text-align: left;
        font-weight: 600;
        color: #475569;
        border: 1px solid #e2e8f0;
    }
    .log-body table td {
        padding: 9px 14px;
        border: 1px solid #e2e8f0;
        color: #334155;
        vertical-align: top;
    }
    .log-body table tr:hover td { background: #f8fafc; }

    .log-body pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 18px 22px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.6;
        margin: 14px 0;
    }
    .log-body code {
        background: #f1f5f9;
        color: #e11d48;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 13px;
        font-family: 'Consolas', monospace;
    }
    .log-body pre code {
        background: transparent;
        color: #e2e8f0;
        padding: 0;
    }
    .log-body p { color: #475569; line-height: 1.7; margin: 8px 0; }
    .log-body ul, .log-body ol { color: #475569; padding-left: 22px; line-height: 1.8; }
    .log-body li { margin-bottom: 4px; }
    .log-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 28px 0; }
    .log-body strong { color: #1e293b; }
</style>
{% endblock %}

{% block content %}
<div class="log-container">
    <div class="log-header">
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Website Log
        </h1>
        <a href="/admin/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Dashboard
        </a>
    </div>

    <div class="log-body">
        {{ content_html|safe }}
    </div>
</div>
{% endblock %}
