{% extends 'base.html' %}

{% block title %}Server Error - Nyveralife{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="bg-red-50 text-red-600 rounded-full p-6 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </div>

    <h1 class="text-4xl font-bold text-gray-900 mb-2">500</h1>
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Server Error</h2>
    <p class="text-gray-600 max-w-md mb-8">
        Something went wrong on our end. We are working to fix it. Please try again later.
    </p>

    <div class="flex gap-4">
        <a href="{% url 'home' %}"
            class="px-6 py-3 bg-pink-600 text-white font-medium rounded-lg hover:bg-pink-700 transition-colors">
            Go Home
        </a>
        <button onclick="window.location.reload()"
            class="px-6 py-3 bg-white text-gray-700 border border-gray-300 font-medium rounded-lg hover:bg-gray-50 transition-colors">
            Refresh Page
        </button>
    </div>
</div>
{% endblock %}
