{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="max-w-xl mx-auto">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <div class="flex items-center gap-4 mb-8">
                    <a href="{% url 'support_tickets' %}" class="p-2 rounded-lg hover:bg-gray-50 text-gray-500">
                        <i data-lucide="arrow-left" class="h-5 w-5"></i>
                    </a>
                    <h2 class="text-2xl font-bold text-gray-900">Create Support Ticket</h2>
                </div>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                            <input type="text" name="subject" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-600 focus:border-green-600 sm:text-sm transition-standard"
                                placeholder="e.g. Issue with my recent order">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                            <textarea name="message" rows="5" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-600 focus:border-green-600 sm:text-sm transition-standard"
                                placeholder="Describe your issue in detail..."></textarea>
                        </div>
                    </div>

                    <div class="pt-4 flex gap-4">
                        <button type="submit" class="flex-1 btn-primary py-2 rounded-lg font-bold shadow-md">
                            Submit Ticket
                        </button>
                        <a href="{% url 'support_tickets' %}"
                            class="flex-1 bg-white border border-gray-300 text-gray-700 py-2 rounded-lg font-bold text-center hover:bg-gray-50 transition-standard">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>

            <div class="mt-8 bg-blue-50 p-6 rounded-xl border border-blue-100">
                <div class="flex gap-4">
                    <div class="text-blue-600">
                        <i data-lucide="info" class="h-6 w-6"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-blue-900 text-sm">Need faster help?</h4>
                        <p class="text-xs text-blue-700 mt-1">Our customer support team typically responds to tickets
                            within 24 hours. For urgent issues, try our live chat or call us directly.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
